<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <div class="logo">
                <img src="/A2 - Assignment Two/Design 1/Assets/logo.png" alt="" width="100">
                <span>ScaleX</span>
            </div>

            <nav class="links">
                <a href="#">Home</a>
                <a href="#">About Us</a>
                <a href="#">Blogs</a>
                <a href="#">Contact Us</a>
            </nav>

            <button>Get Started</button>
        </header>

        <section class="hero">
            <h1>Insights & Blogs</h1>
            <div class="categories">

                <p class="cat">Sass</p>

        <section class="cards">

                <figure>
                    <img src="/A2 - Assignment Two/Design 1/Assets/img1.png" alt="">

                    <h3>The Ultimate Guide To <br> SaaS Marketing</h3>

                    <h3>5 Key Trends in SaaS <br> Growth for 2025</h3>
                    <p class="date">11 July 2026</p>
                </div>
            </div>

            <div class="card">
                <figure>
                    <img src="/A2 - Assignment Two/Design 1/Assets/img3.png" alt="">
                </figure>
                <div class="content">
                    <p class="tag">Marketing</p>
                    <h3>How Data-Driven<br />Strategies Are Important</h3>
